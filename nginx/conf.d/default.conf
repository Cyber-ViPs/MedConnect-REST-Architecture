# Redirecionamento de HTTP para HTTPS
server {
    listen 80;
    server_name localhost;

    autoindex off;

    return 301 https://$host$request_uri;
}

# Main server (HTTPS)
server {
    listen 443 ssl;
    server_name localhost;

    #  SSL certificates --- USE YOUR OWN CERTS IN PRODUCTION ---
    ssl_certificate /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    # Protocols and Cipher Suites
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES2ENHANCED:DHE+AESGCM:AES256+EECDH:AES256+EDH';
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Configuration of security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # API NODE.JS proxy
    location /api/ {
        proxy_pass http://api-container:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        #  WebSockets support for API (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # FRONTEND (CATCH-ALL)
    location / {
        # At production, we need to point to the static build or the Frontend container
        proxy_pass http://host.docker.internal:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        #  HMR Support (Hot Module Replacement)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_ssl_server_name on;
        proxy_ssl_verify off;
    }

    # Gzip Compression for better performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
