#version: '3.8'

services:
  nginx:
    image: nginx:1.28.0-bookworm
    container_name: nginx-webserver-1.0
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./nginx/conf.d:/etc/nginx/conf.d:ro"
      - "./nginx/certs:/etc/nginx/certs:ro"
    depends_on:
      - api
    #condition: service_started
    networks:
      - webnet
      - app_net
  api:
    build:
      context: "./API_node"
      dockerfile: Dockerfile
    image: api_node:2.0-alpha
    pull_policy: build
    container_name: api-container
    hostname: api-server
    ports:
      - "3000:3000"
    volumes:
      - "./API_node:/app"
      - "/app/node_modules"
    restart: always
    env_file:
      - ./API_node/.env
    command: sh -c "npx sequelize-cli db:migrate && npx sequelize-cli db:seed:all && npm start" #remove "npx sequelize-cli db:seed:all &&" when in production to not allow auto seed admin
    environment:
      DATABASE_URL: "postgresql://root:your_password@db:5432/banco_post?schema=public"

    networks:
      - app_net
    depends_on:
       db:
          condition: service_healthy

  db:
    image: postgres:14.18-bookworm
    container_name: db-container
    hostname: db-server
    ports:
      - "5432:5432"
    volumes:
      - "postgres_data:/var/lib/postgresql/data"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: banco_post
    networks:
      - webnet
      - app_net
    healthcheck:
         test: ["CMD-SHELL", "pg_isready -U root -d banco_post"]
         interval: 5s
         timeout: 5s
         retries: 5
         start_period: 10s

networks:
  webnet:
    driver: bridge
  app_net:
    driver: bridge

volumes:
  postgres_data:
  node_modules:
    driver: local
